# Petshop — PostgreSQL + Django + Adminer
#
# แอป web สร้างจากโค้ดในโฟลเดอร์โปรเจกต์นี้เท่านั้น (build.context = โฟลเดอร์ที่มี Dockerfile)
# ไม่ได้ clone หรือดึง compose/Dockerfile จาก GitHub — ใช้ไฟล์บนเครื่องคุณตาม path นี้
# ภาพ postgres / adminer ดึงจาก Docker Hub (official) เมื่อรันครั้งแรก
#
# โหมด production (Gunicorn):
#   cp docker.env.example docker.env
#   แก้ DJANGO_SECRET_KEY (และ POSTGRES_* ถ้าต้องการ)
#   docker compose --profile prod up --build
#
# โหมด dev (runserver + โค้ด mount ที่โฟลเดอร์โปรเจกต์):
#   docker compose --profile dev up --build
#
# หลังขึ้น stack:
#   - เว็บ:     http://127.0.0.1:8000/
#   - Adminer:  http://127.0.0.1:8080/  (System: PostgreSQL, Server: db, User/DB: petshop)
#
# หมายเหตุ: ใช้ profile prod หรือ dev ทีละอย่าง — ทั้งคู่ใช้พอร์ต 8000

name: petshop

x-postgres-env: &postgres-env
  POSTGRES_DB: petshop
  POSTGRES_USER: petshop
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-petshop}

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      <<: *postgres-env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U petshop -d petshop"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  web:
    profiles: ["prod"]
    build:
      context: .
      dockerfile: Dockerfile
    image: petshop-web:local
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - path: docker.env
        required: false
    environment:
      <<: *postgres-env
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      DJANGO_SETTINGS_MODULE: mysite.settings.prod
      DJANGO_ENABLE_WHITENOISE: "1"
      DJANGO_USE_TLS: "0"
    volumes:
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy

  web-dev:
    profiles: ["dev"]
    build:
      context: .
      dockerfile: Dockerfile
    image: petshop-web:local
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - path: docker.env
        required: false
    environment:
      <<: *postgres-env
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      DJANGO_SETTINGS_MODULE: mysite.settings.dev
    volumes:
      - .:/app
    command: python manage.py runserver 0.0.0.0:8000
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  media_data:
